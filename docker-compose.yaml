services:

  signalling-server:
    build:
      context: ./Signalling-server
      dockerfile: Dockerfile
    container_name: signalling-server
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./webrtc-client
      dockerfile: Dockerfile
    container_name: webrtc-frontend
    ports:
      - "5173:5173"
    depends_on:
      - signalling-server
    restart: unless-stopped